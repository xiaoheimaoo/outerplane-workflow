name: Download and Analyze Outerplane XAPK



on:

  workflow_dispatch: # 支持在 Actions 页面手动触发

  schedule:

    # 每天北京时间早上 7:40 (UTC 时间前一天 23:40)

    - cron: "40 23 * * *"



permissions:

  contents: write



jobs:

  download_and_analyze:

    runs-on: ubuntu-latest

    timeout-minutes: 60



    steps:

      - name: Checkout

        uses: actions/checkout@v4



      - name: Check App Version

        id: check_version

        run: |

          # 请求 iTunes API 获取线上最新版本号

          ONLINE_VERSION=$(curl -s "https://itunes.apple.com/us/lookup?bundleId=com.smilegate.outerplane.stove.ios" | jq -r '.results[0].version')

          echo "App Store version: $ONLINE_VERSION"

          

          # 读取本地 version.json 里的版本号 (如果文件存在)

          if [ -f "version.json" ]; then

            LOCAL_VERSION=$(jq -r '.version' version.json)

          else

            LOCAL_VERSION="none"

          fi

          echo "Local version: $LOCAL_VERSION"

          

          # 校验是否成功获取线上版本号，防止接口挂掉导致误判

          if [ -z "$ONLINE_VERSION" ] || [ "$ONLINE_VERSION" == "null" ]; then

            echo "Error: Failed to fetch online version."

            exit 1

          fi



          # 比较版本号

          if [ "$ONLINE_VERSION" == "$LOCAL_VERSION" ]; then

            echo "Version is up to date ($LOCAL_VERSION). Skipping update."

            echo "skip=true" >> $GITHUB_OUTPUT

          else

            echo "New version found! ($LOCAL_VERSION -> $ONLINE_VERSION). Proceeding with update."

            echo "skip=false" >> $GITHUB_OUTPUT

            # 提前更新 version.json，为最后的 commit 准备

            echo "{\"version\": \"$ONLINE_VERSION\"}" > version.json

          fi



      - name: Set up Python

        if: steps.check_version.outputs.skip == 'false'

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"

          

      - name: Set up JDK 17

        if: steps.check_version.outputs.skip == 'false'

        uses: actions/setup-java@v4

        with:

          java-version: '17'

          distribution: 'temurin'



      - name: Install Google Chrome

        if: steps.check_version.outputs.skip == 'false'

        uses: browser-actions/setup-chrome@v1



      - name: Install system dependencies (xvfb, apksigner, jq)

        if: steps.check_version.outputs.skip == 'false'

        run: |

          sudo apt-get update

          sudo apt-get install -y xvfb apksigner jq



      - name: Install JADX

        if: steps.check_version.outputs.skip == 'false'

        run: |

          wget https://github.com/skylot/jadx/releases/download/v1.4.7/jadx-1.4.7.zip

          unzip jadx-1.4.7.zip -d jadx_dir

          sudo ln -s $(pwd)/jadx_dir/bin/jadx /usr/local/bin/jadx



      - name: Install Python dependencies

        if: steps.check_version.outputs.skip == 'false'

        run: |

          python -m pip install --upgrade pip

          pip install requests seleniumbase



      - name: Run Downloader and Analyzer

        if: steps.check_version.outputs.skip == 'false'

        run: python main.py



      - name: Commit and Push changes

        if: steps.check_version.outputs.skip == 'false'

        run: |

          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git config --local user.name "github-actions[bot]"

          

          # 添加所需的文件和目录 (加上 || true 防止目录不存在时报错中断)

          git add artifacts/ || true

          git add sources/ || true

          git add version.json

          

          # 获取要提交的版本号，并提交推送

          COMMIT_VER=$(jq -r '.version' version.json)

          git commit -m "Auto-update: Outerplane APK and Sources to version $COMMIT_VER" || echo "No changes to commit"

          git push

